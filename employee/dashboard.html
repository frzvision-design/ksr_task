<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وظایف من - سامانه خدمات دانشجویی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
        .timer-display {
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        .countdown-expired {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
    </style>
    <script>
        // Security check - must be at the top of head
        (function() {
            const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || 'null');
            if (!currentUser || currentUser.role !== 'employee') {
                window.location.href = '../index.html';
                return;
            }
        })();
    </script>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center">
                    <div class="bg-blue-100 w-10 h-10 rounded-full flex items-center justify-center ml-3">
                        <i class="fas fa-graduation-cap text-blue-600"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">وظایف من</h1>
                        <p class="text-sm text-gray-600">سامانه خدمات دانشجویی</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4 space-x-reverse">
                    <div class="text-sm text-gray-600" id="userInfo"></div>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition duration-300">
                        <i class="fas fa-sign-out-alt ml-1"></i>
                        خروج
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="bg-blue-500 p-3 rounded-full">
                        <i class="fas fa-tasks text-white"></i>
                    </div>
                    <div class="mr-4">
                        <p class="text-sm text-gray-600">کل تسک‌ها</p>
                        <p class="text-2xl font-bold text-gray-900" id="totalTasks">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="bg-yellow-500 p-3 rounded-full">
                        <i class="fas fa-clock text-white"></i>
                    </div>
                    <div class="mr-4">
                        <p class="text-sm text-gray-600">در انتظار</p>
                        <p class="text-2xl font-bold text-gray-900" id="pendingTasks">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="bg-green-500 p-3 rounded-full">
                        <i class="fas fa-check-circle text-white"></i>
                    </div>
                    <div class="mr-4">
                        <p class="text-sm text-gray-600">تکمیل شده</p>
                        <p class="text-2xl font-bold text-gray-900" id="completedTasks">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="bg-red-500 p-3 rounded-full">
                        <i class="fas fa-exclamation-triangle text-white"></i>
                    </div>
                    <div class="mr-4">
                        <p class="text-sm text-gray-600">منقضی شده</p>
                        <p class="text-2xl font-bold text-gray-900" id="overdueTasks">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="border-b">
                <nav class="flex space-x-8 space-x-reverse px-6">
                    <button onclick="filterByStatus('all')" 
                            class="filter-tab py-4 px-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600" 
                            data-filter="all">
                        همه تسک‌ها
                    </button>
                    <button onclick="filterByStatus('pending')" 
                            class="filter-tab py-4 px-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-blue-600" 
                            data-filter="pending">
                        در انتظار
                    </button>
                    <button onclick="filterByStatus('in_progress')" 
                            class="filter-tab py-4 px-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-blue-600" 
                            data-filter="in_progress">
                        در حال انجام
                    </button>
                    <button onclick="filterByStatus('completed')" 
                            class="filter-tab py-4 px-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-blue-600" 
                            data-filter="completed">
                        تکمیل شده
                    </button>
                </nav>
            </div>
        </div>

        <!-- Tasks List -->
        <div id="tasksList" class="space-y-4">
            <!-- Tasks will be loaded here -->
        </div>
    </main>
    <script src="../config.js"></script>
    <script>

        // Global variables
        let currentUser;
        let tasks = [];
        let currentFilter = 'all';
        let timers = {};

        // GitHub API Helper
        class GitHubAPI {
            // Helper function to encode UTF-8 to Base64 (supports Persian/Arabic)
            static utf8ToBase64(str) {
                const utf8Bytes = new TextEncoder().encode(str);
                let binary = '';
                utf8Bytes.forEach(byte => binary += String.fromCharCode(byte));
                return btoa(binary);
            }

            static async getFile(path) {
                try {
                    const response = await fetch(`${GITHUB_CONFIG.apiUrl}/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`, {
                        headers: {
                            'Authorization': `token ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (!response.ok) {
                        throw new Error('فایل یافت نشد');
                    }

                    const data = await response.json();
                    return { content: JSON.parse(atob(data.content)), sha: data.sha };
                } catch (error) {
                    console.error('خطا در دریافت فایل:', error);
                    return this.getFallbackData(path);
                }
            }

            static async updateFile(path, content, sha, message) {
                try {
                    const jsonString = JSON.stringify(content, null, 2);
                    const base64Content = this.utf8ToBase64(jsonString);

                    const response = await fetch(`${GITHUB_CONFIG.apiUrl}/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: message,
                            content: base64Content,
                            sha: sha
                        })
                    });

                    return response.ok;
                } catch (error) {
                    console.error('خطا در بروزرسانی فایل:', error);
                    return false;
                }
            }

            static getFallbackData(path) {
                if (path === 'database/tasks.json') {
                    return {
                        content: {
                            tasks: [
                                {
                                    id: 1,
                                    title: "بررسی مدارک دانشجویان جدید",
                                    description: "بررسی و تایید مدارک ورودی دانشجویان جدید ترم جاری. لطفاً دقت کنید که تمام مدارک کامل و معتبر باشند.",
                                    assignedTo: 2,
                                    createdBy: 1,
                                    priority: "high",
                                    status: "pending",
                                    deadline: "2026-07-05T14:00:00",
                                    createdAt: "2026-06-30T09:00:00",
                                    voiceNote: null,
                                    attachments: [],
                                    completedAt: null,
                                    completedFiles: []
                                },
                                {
                                    id: 2,
                                    title: "آماده‌سازی گزارش ماهانه",
                                    description: "تهیه و ارسال گزارش فعالیت‌های ماه گذشته",
                                    assignedTo: 2,
                                    createdBy: 1,
                                    priority: "medium",
                                    status: "in_progress",
                                    deadline: "2026-07-10T17:00:00",
                                    createdAt: "2026-06-28T10:00:00",
                                    voiceNote: null,
                                    attachments: [],
                                    completedAt: null,
                                    completedFiles: []
                                }
                            ]
                        },
                        sha: null
                    };
                }
                return { content: null, sha: null };
            }
        }

        // Initialize page
        window.addEventListener('load', async function() {
            currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            document.getElementById('userInfo').textContent = `خوش آمدید، ${currentUser.name}`;
            
            await loadTasks();
            updateStatistics();
            renderTasks();
            startAllTimers();
        });

        // Load tasks for current employee
        async function loadTasks() {
            const data = await GitHubAPI.getFile('database/tasks.json');
            tasks = (data.content.tasks || []).filter(task => task.assignedTo === currentUser.id);
        }

        // Update statistics
        function updateStatistics() {
            const now = new Date();
            const totalCount = tasks.length;
            const pendingCount = tasks.filter(t => t.status === 'pending').length;
            const completedCount = tasks.filter(t => t.status === 'completed').length;
            const overdueCount = tasks.filter(t => {
                const deadline = new Date(t.deadline);
                return deadline < now && t.status !== 'completed';
            }).length;

            document.getElementById('totalTasks').textContent = totalCount;
            document.getElementById('pendingTasks').textContent = pendingCount;
            document.getElementById('completedTasks').textContent = completedCount;
            document.getElementById('overdueTasks').textContent = overdueCount;
        }
        // Render tasks based on filter
        function renderTasks() {
            const container = document.getElementById('tasksList');
            const now = new Date();
            
            let filteredTasks = tasks;
            if (currentFilter !== 'all') {
                filteredTasks = tasks.filter(task => {
                    if (currentFilter === 'overdue') {
                        const deadline = new Date(task.deadline);
                        return deadline < now && task.status !== 'completed';
                    }
                    return task.status === currentFilter;
                });
            }

            if (filteredTasks.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow p-12 text-center">
                        <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-600">تسکی برای نمایش وجود ندارد</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredTasks.map(task => {
                const deadline = new Date(task.deadline);
                const isOverdue = deadline < now && task.status !== 'completed';
                
                const priorityColors = {
                    low: 'bg-blue-500',
                    medium: 'bg-yellow-500',
                    high: 'bg-orange-500',
                    urgent: 'bg-red-500'
                };

                const priorityText = {
                    low: 'کم',
                    medium: 'متوسط',
                    high: 'زیاد',
                    urgent: 'فوری'
                };

                const statusColors = {
                    pending: 'bg-yellow-100 text-yellow-800',
                    in_progress: 'bg-blue-100 text-blue-800',
                    completed: 'bg-green-100 text-green-800'
                };

                const statusText = {
                    pending: 'در انتظار',
                    in_progress: 'در حال انجام',
                    completed: 'تکمیل شده'
                };

                return `
                    <div class="bg-white rounded-lg shadow hover:shadow-lg transition duration-300 ${isOverdue ? 'border-2 border-red-500' : ''}">
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex-1">
                                    <div class="flex items-center mb-2">
                                        <div class="w-2 h-2 rounded-full ${priorityColors[task.priority]} ml-2"></div>
                                        <h3 class="text-lg font-bold text-gray-900">${task.title}</h3>
                                    </div>
                                    <p class="text-sm text-gray-600 mb-3">${task.description}</p>
                                    <div class="flex items-center space-x-4 space-x-reverse text-sm text-gray-500">
                                        <span class="flex items-center">
                                            <i class="fas fa-flag ml-1"></i>
                                            اولویت: ${priorityText[task.priority]}
                                        </span>
                                        ${task.voiceNote ? '<span class="flex items-center"><i class="fas fa-microphone text-blue-500 ml-1"></i>دستور صوتی</span>' : ''}
                                        ${task.attachments && task.attachments.length > 0 ? `<span class="flex items-center"><i class="fas fa-paperclip ml-1"></i>${task.attachments.length} فایل پیوست</span>` : ''}
                                    </div>
                                </div>
                                <span class="px-3 py-1 text-xs font-semibold rounded-full ${isOverdue ? 'bg-red-100 text-red-800' : statusColors[task.status]}">
                                    ${isOverdue ? 'منقضی شده' : statusText[task.status]}
                                </span>
                            </div>

                            <!-- Countdown Timer -->
                            <div class="mb-4 p-4 ${isOverdue ? 'bg-red-50' : 'bg-blue-50'} rounded-lg">
                                <div class="flex items-center justify-between">
                                    <span class="text-sm font-medium ${isOverdue ? 'text-red-700' : 'text-blue-700'}">
                                        <i class="fas fa-clock ml-1"></i>
                                        ${isOverdue ? 'زمان منقضی شده:' : 'زمان باقی‌مانده:'}
                                    </span>
                                    <div id="timer-${task.id}" class="timer-display text-lg ${isOverdue ? 'text-red-600 countdown-expired' : 'text-blue-600'}">
                                        00:00:00:00
                                    </div>
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="flex space-x-3 space-x-reverse">
                                <button onclick="viewTaskDetails(${task.id})" 
                                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition duration-300">
                                    <i class="fas fa-eye ml-1"></i>
                                    مشاهده جزئیات
                                </button>
                                ${task.status !== 'completed' ? `
                                    <button onclick="updateTaskStatus(${task.id}, 'in_progress')" 
                                            class="bg-yellow-500 hover:bg-yellow-600 text-white py-2 px-4 rounded-lg transition duration-300 ${task.status === 'in_progress' ? 'opacity-50 cursor-not-allowed' : ''}" 
                                            ${task.status === 'in_progress' ? 'disabled' : ''}>
                                        <i class="fas fa-play ml-1"></i>
                                        شروع
                                    </button>
                                    <button onclick="completeTask(${task.id})" 
                                            class="bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg transition duration-300">
                                        <i class="fas fa-check ml-1"></i>
                                        تکمیل
                                    </button>
                                ` : `
                                    <button class="bg-green-500 text-white py-2 px-4 rounded-lg opacity-50 cursor-not-allowed" disabled>
                                        <i class="fas fa-check-double ml-1"></i>
                                        تکمیل شده
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Start timers for visible tasks
            filteredTasks.forEach(task => {
                if (!timers[task.id]) {
                    startTimer(task.id, task.deadline, task.status === 'completed');
                }
            });
        }

        // Start countdown timer for a task
        function startTimer(taskId, deadline, isCompleted) {
            if (isCompleted) return;

            const timerElement = document.getElementById(`timer-${taskId}`);
            if (!timerElement) return;

            const updateTimer = () => {
                const now = new Date().getTime();
                const deadlineTime = new Date(deadline).getTime();
                const distance = deadlineTime - now;

                if (distance < 0) {
                    const absDistance = Math.abs(distance);
                    const days = Math.floor(absDistance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((absDistance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((absDistance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((absDistance % (1000 * 60)) / 1000);

                    timerElement.textContent = `${days} روز : ${hours.toString().padStart(2, '0')} ساعت : ${minutes.toString().padStart(2, '0')} دقیقه : ${seconds.toString().padStart(2, '0')} ثانیه`;
                    timerElement.classList.add('countdown-expired');
                } else {
                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                    timerElement.textContent = `${days} روز : ${hours.toString().padStart(2, '0')} ساعت : ${minutes.toString().padStart(2, '0')} دقیقه : ${seconds.toString().padStart(2, '0')} ثانیه`;
                }
            };

            updateTimer();
            timers[taskId] = setInterval(updateTimer, 1000);
        }

        // Start all timers
        function startAllTimers() {
            tasks.forEach(task => {
                if (task.status !== 'completed') {
                    startTimer(task.id, task.deadline, false);
                }
            });
        }

        // Filter by status
        function filterByStatus(status) {
            currentFilter = status;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('border-blue-600', 'text-blue-600');
                tab.classList.add('border-transparent', 'text-gray-600');
            });
            
            const activeTab = document.querySelector(`[data-filter="${status}"]`);
            activeTab.classList.remove('border-transparent', 'text-gray-600');
            activeTab.classList.add('border-blue-600', 'text-blue-600');

            // Clear existing timers
            Object.values(timers).forEach(timer => clearInterval(timer));
            timers = {};

            renderTasks();
        }

        // View task details
        function viewTaskDetails(taskId) {
            window.location.href = `./task-details.html?id=${taskId}`;
        }

        // Update task status
        async function updateTaskStatus(taskId, newStatus) {
            try {
                const tasksData = await GitHubAPI.getFile('database/tasks.json');
                const taskIndex = tasksData.content.tasks.findIndex(t => t.id === taskId);
                
                if (taskIndex !== -1) {
                    tasksData.content.tasks[taskIndex].status = newStatus;
                    
                    const success = await GitHubAPI.updateFile(
                        'database/tasks.json',
                        tasksData.content,
                        tasksData.sha,
                        `Update task status: ${taskId}`
                    );

                    if (success) {
                        await loadTasks();
                        updateStatistics();
                        renderTasks();
                    }
                }
            } catch (error) {
                console.error('خطا در بروزرسانی وضعیت:', error);
                alert('خطا در بروزرسانی وضعیت تسک');
            }
        }

        // Complete task
        function completeTask(taskId) {
            window.location.href = `./task-details.html?id=${taskId}&action=complete`;
        }

        // Logout
        function logout() {
            if (confirm('آیا می‌خواهید از سیستم خارج شوید؟')) {
                sessionStorage.removeItem('currentUser');
                localStorage.removeItem('currentUser');
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
